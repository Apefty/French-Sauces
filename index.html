<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#2C1A0E">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Sauces">
<title>French Sauces</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">

  <div class="hdr">
    <button class="hdr-back" id="btn-back" style="display:none" onclick="goBack()">&#8249;</button>
    <div class="hdr-title" id="hdr-title">French Sauces</div>
    <button class="hdr-btn" id="btn-fav-h" style="display:none" onclick="toggleFav()">🤍</button>
    <button class="hdr-btn hdr-btn-add" id="btn-add" onclick="openForm(null)">+</button>
  </div>

  <!-- HOME -->
  <div class="screen active" id="s-home">
    <div class="scroll-body">
      <div class="hero">
        <div class="hero-eyebrow">Classical Repertoire</div>
        <div class="hero-title">Les <em>Grandes</em><br>Sauces</div>
        <div class="hero-sub">French culinary sauces &#8212; complete catalog</div>
      </div>
      <div class="search-wrap">
        <span class="search-ico">&#128269;</span>
        <input type="text" id="srch" placeholder="Search sauces, ingredients, technique&#8230;" oninput="onSearch(this.value)">
      </div>
      <div id="sres" class="search-results"></div>
      <div id="home-main">
        <div class="sec-label">Browse by</div>
        <div class="home-grid">
          <div class="home-card" onclick="navTo('hierarchy')">
            <div class="home-card-ico">&#127795;</div>
            <div class="home-card-title">Hierarchy</div>
            <div class="home-card-desc">Mother sauces and derivatives</div>
          </div>
          <div class="home-card" onclick="navTo('usage')">
            <div class="home-card-ico">&#127869;</div>
            <div class="home-card-title">By Dish</div>
            <div class="home-card-desc">Find sauce for your product</div>
          </div>
          <div class="home-card" onclick="navTo('technique')">
            <div class="home-card-ico">&#128104;&#8205;&#127859;</div>
            <div class="home-card-title">By Technique</div>
            <div class="home-card-desc">Emulsified, roux-based&#8230;</div>
          </div>
          <div class="home-card" onclick="navTo('favs')">
            <div class="home-card-ico">&#129293;</div>
            <div class="home-card-title">Saved</div>
            <div class="home-card-desc">Your saved sauces</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="screen" id="s-hierarchy"><div class="scroll-body" id="hier-b"></div></div>
  <div class="screen" id="s-usage"><div class="scroll-body" id="usage-b"></div></div>
  <div class="screen" id="s-technique"><div class="scroll-body" id="tech-b"></div></div>
  <div class="screen" id="s-sublist"><div class="scroll-body" id="sub-b"></div></div>
  <div class="screen" id="s-sauce"><div class="scroll-body" id="sauce-b"></div></div>
  <div class="screen" id="s-favs"><div class="scroll-body" id="favs-b"></div></div>
  <div class="screen" id="s-form"><div class="scroll-body"><div class="form-body" id="form-b"></div></div></div>

  <div class="bnav">
    <button class="bnav-btn on" id="nb-home" onclick="navTo('home')">
      <div class="bnav-ico">&#127968;</div><div class="bnav-lbl">Home</div>
    </button>
    <button class="bnav-btn" id="nb-hierarchy" onclick="navTo('hierarchy')">
      <div class="bnav-ico">&#127795;</div><div class="bnav-lbl">Structure</div>
    </button>
    <button class="bnav-btn" id="nb-usage" onclick="navTo('usage')">
      <div class="bnav-ico">&#127869;</div><div class="bnav-lbl">By Dish</div>
    </button>
    <button class="bnav-btn" id="nb-favs" onclick="navTo('favs')">
      <div class="bnav-ico">&#129293;</div><div class="bnav-lbl">Saved</div>
    </button>
  </div>

</div>
<div class="toast" id="toast"></div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
