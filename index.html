<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#3D2B1F">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Sauces">
<title>French Sauces</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bd:#3D2B1F;--b:#6B4226;--bl:#9C6B3C;--a:#C4872A;--al:#DBA55A;
  --c:#FAF7F2;--cd:#F0EAE0;--p:#C8B89A;
  --t:#1C1008;--m:#7A6A58;--dv:#DDD0BC;
  --g:#4A6741;--r:#8B2E2E;--w:white;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;overflow:hidden;background:var(--bd);font-family:'Inter',sans-serif;color:var(--t)}
#app{height:100%;width:100%;max-width:430px;margin:0 auto;background:var(--c);display:flex;flex-direction:column;overflow:hidden;box-shadow:0 0 40px rgba(0,0,0,.3)}
.hdr{height:54px;background:var(--bd);display:flex;align-items:center;padding:0 14px;gap:8px;flex-shrink:0}
.hbk{width:34px;height:34px;border:none;background:rgba(255,255,255,.12);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--c);font-size:22px;flex-shrink:0}
.htl{flex:1;font-family:'Playfair Display',serif;font-size:18px;font-weight:500;color:var(--c);letter-spacing:.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hbt{width:34px;height:34px;border:none;background:transparent;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:19px;color:var(--al);flex-shrink:0}
.hbt:active{background:rgba(255,255,255,.1)}
.screen{display:none;flex:1;flex-direction:column;overflow:hidden}
.screen.active{display:flex}
.sb{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;background:var(--c)}
.sb::-webkit-scrollbar{display:none}
.bnav{height:58px;background:var(--bd);display:flex;padding:0 4px;padding-bottom:env(safe-area-inset-bottom,0);flex-shrink:0;border-top:1px solid rgba(255,255,255,.1)}
.nb{flex:1;height:100%;border:none;background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border-radius:8px}
.nb .nb-ico{font-size:20px;opacity:.4}
.nb .nb-lbl{font-size:9px;color:rgba(255,255,255,.38);text-transform:uppercase;letter-spacing:.05em;font-weight:500}
.nb.on .nb-ico{opacity:1}
.nb.on .nb-lbl{color:var(--al)}
.hero{background:var(--bd);padding:24px 20px 32px;position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:24px;background:var(--c);border-radius:24px 24px 0 0}
.htag{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:8px}
.htit{font-family:'Playfair Display',serif;font-size:34px;font-weight:400;color:var(--c);line-height:1.1}
.htit em{font-style:italic;color:var(--al)}
.hsub{font-size:12px;color:rgba(255,255,255,.4);margin-top:10px;font-weight:300}
.swrap{padding:16px 14px 0;position:relative}
.swrap input{width:100%;height:44px;border:1.5px solid var(--dv);border-radius:22px;padding:0 16px 0 44px;font-size:13px;background:var(--w);color:var(--t);outline:none;font-family:'Inter',sans-serif}
.swrap input:focus{border-color:var(--a)}
.swrap input::placeholder{color:var(--m)}
.sico{position:absolute;left:28px;top:50%;transform:translateY(-50%);color:var(--m);pointer-events:none;font-size:16px}
.slbl{padding:20px 16px 10px;font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--m)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 14px 20px}
.gc{background:var(--w);border-radius:16px;padding:18px 14px;border:1px solid var(--dv);cursor:pointer;box-shadow:0 2px 8px rgba(61,43,31,.07)}
.gc:active{transform:scale(.96)}
.gico{width:44px;height:44px;background:var(--cd);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:12px}
.gt{font-size:11px;font-weight:600;color:var(--b);letter-spacing:.05em;text-transform:uppercase;margin-bottom:4px}
.gd{font-size:11px;color:var(--m);line-height:1.45;font-weight:300}
.sres{display:none;padding:10px 14px}
.sri{display:flex;align-items:center;gap:10px;padding:11px 12px;background:var(--w);border-radius:12px;border:1px solid var(--dv);margin-bottom:7px;cursor:pointer}
.sri:active{border-color:var(--a)}
.srio{width:36px;height:36px;border-radius:9px;background:var(--cd);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.srn{font-size:13px;font-weight:500;color:var(--t)}
.src{font-size:11px;color:var(--m);margin-top:1px}
.cg-wrap{border-bottom:1px solid var(--dv)}
.ch{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;background:var(--w)}
.ch:active{background:var(--cd)}
.cico{width:36px;height:36px;border-radius:9px;background:var(--cd);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.cnm{flex:1}
.cnm-m{font-size:14px;font-weight:500;color:var(--b);font-family:'Playfair Display',serif}
.cnm-f{font-size:11px;color:var(--m);margin-top:1px}
.chev{color:var(--p);font-size:16px;transition:transform .2s;display:inline-block}
.chev.open{transform:rotate(90deg)}
.csl{display:none;background:var(--cd)}
.csl.open{display:block}
.csi{padding:0 16px 0 62px;border-bottom:1px solid rgba(200,184,154,.35)}
.csh{display:flex;align-items:center;justify-content:space-between;padding:11px 0;cursor:pointer}
.csnm{font-size:11px;font-weight:600;color:var(--m);text-transform:uppercase;letter-spacing:.06em}
.csmo{font-size:10px;color:var(--p);margin-top:2px}
.csch{color:var(--p);font-size:13px;transition:transform .2s;display:inline-block}
.csch.open{transform:rotate(90deg)}
.css2{display:none;padding:4px 0 12px}
.css2.open{display:block}
.sli{display:flex;align-items:center;padding:9px 0 9px 4px;cursor:pointer;border-radius:8px}
.sli:active{background:rgba(200,184,154,.4)}
.sld{width:6px;height:6px;border-radius:50%;background:var(--a);flex-shrink:0;margin-right:9px}
.sln{font-size:13px;color:var(--t);flex:1}
.slt{font-size:10px;padding:2px 7px;background:rgba(196,135,42,.12);border-radius:5px;color:var(--a);font-weight:600;margin-right:4px;border:1px solid rgba(196,135,42,.2)}
.cli-list{padding:10px 14px}
.cli{display:flex;align-items:center;gap:12px;padding:13px 14px;background:var(--w);border-radius:12px;border:1px solid var(--dv);margin-bottom:8px;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.cli:active{border-color:var(--a)}
.clio{font-size:22px;width:30px;text-align:center;flex-shrink:0}
.clnm{font-size:14px;font-weight:500;color:var(--t);flex:1}
.clct{font-size:12px;color:var(--m)}
.cl-arr{color:var(--p);font-size:16px}
.sauce-hero{background:var(--bd);position:relative;overflow:hidden}
.shimg{width:100%;height:180px;object-fit:cover;display:block}
.shc{padding:16px 18px 28px;position:relative}
.sauce-hero::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:20px;background:var(--w);border-radius:20px 20px 0 0}
.scat{font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--al);margin-bottom:8px}
.snm2{font-family:'Playfair Display',serif;font-size:28px;font-weight:500;color:var(--c);line-height:1.1;margin-bottom:5px}
.sfr{font-family:'Playfair Display',serif;font-size:15px;font-style:italic;color:rgba(255,255,255,.45)}
.sec{padding:16px;border-bottom:1px solid var(--dv);background:var(--w)}
.sec:nth-child(even){background:var(--c)}
.stl{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--m);margin-bottom:12px}
.mg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.mi{background:var(--cd);border-radius:10px;padding:9px 11px;border:1px solid var(--dv)}
.ml{font-size:9px;color:var(--m);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px;font-weight:600}
.mv{font-size:12px;font-weight:500;color:var(--b)}
.bc{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.bci{font-size:12px;color:var(--m);background:var(--cd);padding:4px 11px;border-radius:20px;border:1px solid var(--dv);cursor:pointer}
.bci:active{border-color:var(--a);color:var(--a)}
.bci.plain{cursor:default}
.bci.current{background:var(--a);color:white;border-color:var(--a);font-weight:500}
.bcsep{color:var(--p);font-size:13px}
.tgs{display:flex;flex-wrap:wrap;gap:6px}
.tg2{font-size:11px;padding:4px 11px;background:var(--cd);border-radius:20px;color:var(--m);border:1px solid var(--dv)}
.ig{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.igg{background:var(--cd);border-radius:10px;padding:11px;border:1px solid var(--dv)}
.igt{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--m);margin-bottom:8px;font-weight:600}
.igi{font-size:12px;color:var(--t);padding:3px 0;border-bottom:1px solid rgba(200,184,154,.5);line-height:1.4}
.igi:last-child{border-bottom:none}
.igi::before{content:'• ';color:var(--a)}
.stp{display:flex;gap:11px;margin-bottom:8px;padding:11px;background:var(--cd);border-radius:11px;border:1px solid var(--dv)}
.stn{width:26px;height:26px;border-radius:50%;background:var(--bd);color:var(--c);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.stx{font-size:12px;color:var(--t);line-height:1.55;padding-top:2px}
.rb{background:var(--cd);border-radius:11px;padding:14px;border:1px solid var(--dv)}
.rt{font-size:12px;color:var(--t);line-height:1.8;font-weight:300}
.rl{display:flex;flex-direction:column;gap:6px}
.rli{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;background:var(--cd);border-radius:10px;border:1px solid var(--dv);cursor:pointer}
.rli:active{border-color:var(--a)}
.dt{background:var(--cd);border-radius:11px;padding:16px;border:1px solid var(--dv);text-align:center}
.dtm{display:inline-block;padding:7px 16px;background:var(--bd);color:var(--c);border-radius:8px;font-family:'Playfair Display',serif;font-size:14px;margin-bottom:10px}
.dtl{width:1px;height:14px;background:var(--p);margin:0 auto 10px}
.dtc{display:flex;gap:7px;justify-content:center;flex-wrap:wrap}
.dtch{padding:6px 12px;border-radius:20px;background:var(--w);border:1px solid var(--dv);font-size:11px;color:var(--b);cursor:pointer}
.dtch.cur{background:var(--a);color:white;border-color:var(--a)}
.notes-view{background:var(--cd);border-radius:10px;padding:12px 14px;border:1px solid var(--dv);min-height:56px;font-size:13px;color:var(--t);line-height:1.65;white-space:pre-wrap}
.notes-view.empty{color:var(--m);font-style:italic;font-size:12px}
.nta{width:100%;min-height:90px;background:var(--w);border:1.5px solid var(--a);border-radius:10px;padding:11px 13px;font-family:'Inter',sans-serif;font-size:13px;line-height:1.6;color:var(--t);resize:none;outline:none;display:none}
.notes-btns{display:flex;gap:8px;margin-top:8px}
.btn-row{display:flex;gap:8px}
.btn-a{flex:1;min-width:0;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;font-size:12px;font-weight:500;font-family:'Inter',sans-serif;border:1.5px solid;white-space:nowrap}
.btn-a:active{opacity:.78}
.btn-fav{background:var(--cd);border-color:var(--dv);color:var(--b)}
.btn-fav.on{background:rgba(139,46,46,.09);border-color:rgba(139,46,46,.4);color:var(--r)}
.btn-edit{background:rgba(196,135,42,.09);border-color:var(--a);color:var(--a)}
.btn-del{background:rgba(139,46,46,.07);border-color:rgba(139,46,46,.35);color:var(--r)}
.btn-note{background:var(--cd);border-color:var(--dv);color:var(--b)}
.btn-save-note{background:var(--bd);border-color:var(--bd);color:var(--c);display:none}
.badgec{display:inline-block;font-size:10px;padding:2px 7px;background:rgba(196,135,42,.14);color:var(--a);border-radius:8px;border:1px solid rgba(196,135,42,.28);margin-left:6px;vertical-align:middle;font-weight:500}
.fe{text-align:center;padding:64px 24px;color:var(--m)}
.fe-ico{font-size:52px;margin-bottom:14px;opacity:.6}
.fe p{font-size:13px;line-height:1.65;font-weight:300}
.fb{padding:16px}
.fs{margin-bottom:22px}
.fst{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--m);margin-bottom:12px;padding-bottom:7px;border-bottom:1.5px solid var(--dv)}
.fr2{margin-bottom:10px}
.fr2 label{display:block;font-size:11px;color:var(--m);margin-bottom:4px;font-weight:500}
.fr2 input,.fr2 select,.fr2 textarea{width:100%;border:1.5px solid var(--dv);border-radius:10px;padding:9px 11px;font-size:13px;font-family:'Inter',sans-serif;color:var(--t);background:var(--w);outline:none}
.fr2 input:focus,.fr2 select:focus,.fr2 textarea:focus{border-color:var(--a)}
.fr2 textarea{resize:vertical;min-height:80px;line-height:1.55}
.f2col{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.fpa{border:1.5px dashed var(--p);border-radius:12px;height:130px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:7px;background:var(--cd);position:relative;overflow:hidden}
.fpa input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;font-size:0}
.fpai{font-size:32px;opacity:.6}
.fpas{font-size:12px;color:var(--m)}
.fpp{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.dl{display:flex;flex-direction:column;gap:6px}
.dr{display:flex;gap:6px;align-items:center}
.dr input{flex:1;border:1.5px solid var(--dv);border-radius:10px;padding:8px 11px;font-size:12px;font-family:'Inter',sans-serif;color:var(--t);background:var(--w);outline:none}
.dr input:focus{border-color:var(--a)}
.drd{width:28px;height:28px;border:none;background:transparent;cursor:pointer;color:var(--m);font-size:15px;flex-shrink:0}
.dra{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--a);cursor:pointer;padding:5px 0;background:none;border:none;font-family:'Inter',sans-serif;font-weight:500}
.fa{display:flex;gap:9px;margin-top:24px;padding-bottom:24px}
.bsv{flex:2;height:46px;background:var(--bd);color:var(--c);border:none;border-radius:11px;font-size:14px;font-weight:500;font-family:'Inter',sans-serif;cursor:pointer}
.bcn{flex:1;height:46px;background:var(--cd);color:var(--m);border:1.5px solid var(--dv);border-radius:11px;font-size:13px;font-family:'Inter',sans-serif;cursor:pointer}
.sync{position:fixed;bottom:68px;right:14px;font-size:11px;padding:5px 12px;border-radius:16px;background:var(--bd);color:var(--c);opacity:0;transition:opacity .3s;pointer-events:none;z-index:99;font-weight:500}
.sync.show{opacity:1}
.sync.err{background:var(--r)}
.toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);background:var(--bd);color:var(--c);padding:10px 22px;border-radius:22px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;z-index:999;font-weight:500}
.toast.show{opacity:1}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <button class="hbk" id="btn-back" style="display:none" onclick="goBack()">&#8249;</button>
    <div class="htl" id="hdr-t">French Sauces</div>
    <button class="hbt" id="btn-fav-h" style="display:none" onclick="toggleFav()">&#9825;</button>
    <button class="hbt" id="btn-add" onclick="openForm(null)" style="font-size:26px;font-weight:300">+</button>
  </div>
  <div class="screen active" id="s-home">
    <div class="sb">
      <div class="hero">
        <div class="htag">Classical Repertoire</div>
        <div class="htit">Les <em>Grandes</em><br>Sauces</div>
        <div class="hsub">French culinary sauces &#8212; complete catalog</div>
      </div>
      <div class="swrap">
        <span class="sico">&#128269;</span>
        <input type="text" id="srch" placeholder="Search sauces, ingredients, technique&#8230;" oninput="onSearch(this.value)">
      </div>
      <div id="sres" class="sres"></div>
      <div id="home-main">
        <div class="slbl">Browse by</div>
        <div class="grid">
          <div class="gc" onclick="navTo('hierarchy')"><div class="gico">&#127795;</div><div class="gt">Hierarchy</div><div class="gd">Mother sauces and derivatives</div></div>
          <div class="gc" onclick="navTo('usage')"><div class="gico">&#127869;</div><div class="gt">By Dish</div><div class="gd">Find sauce for your product</div></div>
          <div class="gc" onclick="navTo('technique')"><div class="gico">&#128104;&#8205;&#127859;</div><div class="gt">By Technique</div><div class="gd">Emulsified, roux-based&#8230;</div></div>
          <div class="gc" onclick="navTo('favs')"><div class="gico">&#129293;</div><div class="gt">Saved</div><div class="gd">Your saved sauces</div></div>
        </div>
      </div>
    </div>
  </div>
  <div class="screen" id="s-hierarchy"><div class="sb" id="hier-b"></div></div>
  <div class="screen" id="s-usage"><div class="sb" id="usage-b"></div></div>
  <div class="screen" id="s-technique"><div class="sb" id="tech-b"></div></div>
  <div class="screen" id="s-sublist"><div class="sb" id="sub-b"></div></div>
  <div class="screen" id="s-sauce"><div class="sb" id="sauce-b"></div></div>
  <div class="screen" id="s-favs"><div class="sb" id="favs-b"></div></div>
  <div class="screen" id="s-form"><div class="sb"><div class="fb" id="form-b"></div></div></div>
  <div class="bnav">
    <button class="nb on" id="nb-home" onclick="navTo('home')"><div class="nb-ico">&#127968;</div><div class="nb-lbl">Home</div></button>
    <button class="nb" id="nb-hierarchy" onclick="navTo('hierarchy')"><div class="nb-ico">&#127795;</div><div class="nb-lbl">Structure</div></button>
    <button class="nb" id="nb-usage" onclick="navTo('usage')"><div class="nb-ico">&#127869;</div><div class="nb-lbl">By Dish</div></button>
    <button class="nb" id="nb-favs" onclick="navTo('favs')"><div class="nb-ico">&#129293;</div><div class="nb-lbl">Saved</div></button>
  </div>
</div>
<div class="sync" id="sync-status"></div>
<div class="toast" id="toast"></div>

<script>
const SAUCES_DATA = {
  categories: [
    {
      id: "white-sauces",
      name: "White Sauces",
      nameFr: "Sauces Blanches",
      icon: "🤍",
      subcategories: [
        {
          id: "velute-veal",

        },
        {

          motherSauce: "Velouté (poultry stock)",

        },
        {
          id: "velute-fish",
          name: "Fish Velouté",
          motherSauce: "Velouté (fish stock)",
          sauces: ["Bercy Fish", "Normandy", "Cardinal", "Marinière", "Saint-Malo", "Véron", "Breton", "Shrimp", "Genevoise", "Villeroi (fish)"]
        },
        {
          id: "bechamel",
          name: "Béchamel",
          motherSauce: "Béchamel (milk-based)",
          sauces: ["Mornay", "Soubise", "Nantua"]
        }
      ]
    },
    {
      id: "brown-sauces",
      name: "Brown Sauces",
      nameFr: "Sauces Brunes",
      icon: "🟤",
      subcategories: [
        {
          id: "espagnole",
          name: "Espagnole / Demi-glace",
          motherSauce: "Espagnole / Demi-glace",
          sauces: ["Bercy (meat)", "Madeira", "Porto", "Chateaubriand", "Godard", "Périgueux", "Bordelaise", "Robert", "Piquante", "Diable", "Sainte-Menehould", "Zingara"]
        },
        {
          id: "poultry-brown",
          name: "Brown Poultry Stock",
          motherSauce: "Brown poultry stock",
          sauces: ["Chasseur", "Bigarade", "Rouennaise"]
        },
        {
          id: "game-stock",

<script>

function rebuildTG() {
  Object.keys(TG).forEach(k => TG[k] = []);
  Object.entries(allR()).forEach(([k, s]) => {
    if (s.tp === "Emulsified") TG[s.tm === "Hot" ? "Emulsified (Hot)" : "Emulsified (Cold)"].push(k);

// ── FIREBASE ──────────────────────────────────────────────────────────
const FB_CFG = {

let _db = null;

async function getDB() {
  if (_db) return _db;
  const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
  const { getFirestore, doc, getDoc, setDoc, deleteDoc, collection, onSnapshot } =
    await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
  const app = initializeApp(FB_CFG);
  _db = { fs: getFirestore(app), doc, getDoc, setDoc, deleteDoc, collection, onSnapshot };
  return _db;
}

function syncStatus(msg, err = false) {
  const el = document.getElementById("sync-status");
  el.textContent = msg;
  el.className = "sync show" + (err ? " err" : "");
  clearTimeout(el._t);

}

async function loadUserData() {
  try {
    const { fs, doc, getDoc } = await getDB();
    const snap = await getDoc(doc(fs, "userdata", "main"));
    if (snap.exists()) {
      const d = snap.data();
      favs = d.favs || [];
      notes = d.notes || {};
    }
  } catch(e) { console.warn("Could not load user data", e); }
}

async function saveUserData() {
  try {
    const { fs, doc, setDoc } = await getDB();
    await setDoc(doc(fs, "userdata", "main"), { favs, notes });
  } catch(e) { console.warn("Could not save user data", e); }
}

async function listenSauces(cb) {
  const { fs, collection, onSnapshot } = await getDB();
  return onSnapshot(collection(fs, "sauces"), snap => {
    const r = {};
    snap.forEach(d => { r[d.id] = d.data(); });
    cb(r);
  });
}

async function fbSaveSauce(key, data) {
  const { fs, doc, setDoc } = await getDB();
  await setDoc(doc(fs, "sauces", key), data);
}

async function fbDeleteSauce(key) {
  const { fs, doc, deleteDoc } = await getDB();
  await deleteDoc(doc(fs, "sauces", key));
}

function onSearch(v) {
  const q = v.trim().toLowerCase();
  const res = document.getElementById("sres");
  const main = document.getElementById("home-main");
  if (!q) { res.style.display = "none"; res.innerHTML = ""; main.style.display = ""; return; }
  res.style.display = "block"; main.style.display = "none";
  const R = allR();
  const ms = Object.entries(R).filter(([k, s]) =>
    [s.nm, s.fr, s.cat, s.mo, ...(s.pr || []), ...Object.values(s.ig || {}).flat(), s.rc || ""]
    .join(" ").toLowerCase().includes(q)
  );
  if (!ms.length) {
    res.innerHTML = `<div style="text-align:center;padding:30px 20px;color:#7A6050;font-size:14px">No results for "<b>${esc(v)}</b>"</div>`;
    return;
  }
  res.innerHTML = ms.map(([k, s]) => `
    <div class="sri" onclick="openSauce('${k}')">

        <div class="srn">${esc(s.nm)}${custom[k] ? '<span class="badgec">custom</span>' : ''}</div>

    </div>`).join("");
}

// ── KEY LOOKUP ────────────────────────────────────────────────────────
function fKey(nm) {
  const R = allR();
  const l = nm.toLowerCase();
  return Object.keys(R).find(k =>
    k.toLowerCase() === l ||
    R[k].nm.toLowerCase() === l ||
    R[k].nm.toLowerCase().includes(l) ||
    l.includes(R[k].nm.toLowerCase().split(" ")[0])
  ) || null;
}

function openSauce(key, push = true) {
  const R = allR();
  const s = R[key]; if (!s) return;
  cur = key;
  const fav = favs.includes(key);
  const isCust = !!custom[key];
  const photo = s.photo || "";
  const nt_ = notes[key] || "";

  // Breadcrumbs
  const bcItems = [];
  if (s.mo && s.mo !== "—" && s.mo !== s.nm) {
    const moKey = fKey(s.mo);
    if (moKey && moKey !== key) {
      bcItems.push(`<span class="bci" onclick="openSauce('${moKey}')">${esc(s.mo)}</span><span class="bcsep">›</span>`);
    } else {
      bcItems.push(`<span class="bci plain">${esc(s.mo)}</span><span class="bcsep">›</span>`);
    }
  }
  bcItems.push(`<span class="bci plain" style="font-weight:500;color:var(--b)">${esc(s.nm)}</span>`);

  const ingr = s.ig ? `<div class="ig">
    ${Object.entries(s.ig).filter(([, v]) => v?.length).map(([lbl, items]) => `
      <div class="igg">
        <div class="igt">${lbl}</div>
        ${items.map(i => `<div class="igi">${esc(i)}</div>`).join("")}
      </div>`).join("")}
  </div>` : "";

  const steps = s.st?.length ? `<div class="stps">
    ${s.st.map((t, i) => `
      <div class="stp">
        <div class="stn">${i + 1}</div>
        <div class="stx">${esc(t)}</div>
      </div>`).join("")}
  </div>` : "";

  const deriv = s.dv?.length ? `<div class="dt">
    <div class="dtm">${esc(s.nm)}</div>
    <div class="dtl"></div>
    <div class="dtc">
      ${s.dv.map(d => {
        const dk = fKey(d);
        return `<div class="dtch${dk === key ? " cur" : ""}" onclick="${dk ? `openSauce('${dk}')` : ""}">${esc(d)}</div>`;
      }).join("")}
    </div>
  </div>` : "";

  const sim = s.sm?.length ? `<div class="rl">
    ${s.sm.filter(n => { const sk = fKey(n); return sk && sk !== key; }).map(n => {
      const sk = fKey(n);
      return `<div class="rli" onclick="openSauce('${sk}')">
        <span style="font-size:13px">${esc(R[sk]?.nm || n)}</span>
        <span style="color:#D4C4A0">›</span>
      </div>`;
    }).join("")}
  </div>` : "";

  document.getElementById("sauce-b").innerHTML = `
    <div class="sauce-hero">
      ${photo ? `<img class="shimg" src="${photo}" alt="">` : ""}
      <div class="shc">
        <div class="scat">${CICO[s.cat] || "🍶"} ${esc(s.cat)}${isCust ? '<span class="badgec">custom</span>' : ""}</div>
        <div class="snm2">${esc(s.nm)}</div>
        ${s.fr && s.fr !== s.nm ? `<div class="sfr">${esc(s.fr)}</div>` : ""}
      </div>
    </div>

    <div class="sec">
      <div class="stl">Classification</div>
      <div class="bc">${bcItems.join("")}</div>
    </div>

    <div class="sec">
      <div class="stl">Properties</div>
      <div class="mg">
        <div class="mi"><div class="ml">Type</div><div class="mv">${esc(s.tp || "—")}</div></div>
        <div class="mi"><div class="ml">Temperature</div><div class="mv">${esc(s.tm || "—")}</div></div>
        <div class="mi"><div class="ml">Difficulty</div><div class="mv">${esc(s.df || "—")}</div></div>
        <div class="mi"><div class="ml">Time</div><div class="mv">${esc(s.ti || "—")}</div></div>
        <div class="mi"><div class="ml">Base</div><div class="mv">${esc(s.bs || "—")}</div></div>
        <div class="mi"><div class="ml">Classic</div><div class="mv">${esc(s.cl || "Escoffier")}</div></div>
      </div>
    </div>

    ${s.pr?.length ? `<div class="sec"><div class="stl">Pairs with</div><div class="tgs">${s.pr.map(p => `<span class="tg2">${esc(p)}</span>`).join("")}</div></div>` : ""}
    ${ingr ? `<div class="sec"><div class="stl">Ingredients</div>${ingr}</div>` : ""}
    ${steps ? `<div class="sec"><div class="stl">Technique</div>${steps}</div>` : ""}
    ${s.rc ? `<div class="sec"><div class="stl">Full recipe</div><div class="rb"><div class="rt">${esc(s.rc)}</div></div></div>` : ""}
    ${deriv ? `<div class="sec"><div class="stl">Derivative sauces</div>${deriv}</div>` : ""}
    ${sim ? `<div class="sec"><div class="stl">Similar sauces</div>${sim}</div>` : ""}

    <div class="sec">
      <div class="stl">My notes</div>
      <div class="notes-view${nt_ ? "" : " empty"}" id="notes-view">${nt_ ? esc(nt_) : "No notes yet. Tap Edit to add."}</div>
      <textarea class="nta" id="nta" placeholder="Write your notes, tips, personal variations…">${esc(nt_)}</textarea>
      <div class="notes-btns">
        <button class="btn-act btn-note" id="btn-note-edit" onclick="toggleNoteEdit()">✎ Edit notes</button>

      </div>
    </div>

    <div style="height:40px"></div>`;

  document.getElementById("sauce-b").scrollTop = 0;
  if (push) showS("sauce", s.nm);
  else document.getElementById("hdr-t").textContent = s.nm;
  updFavIco();
}

// ── NOTES ─────────────────────────────────────────────────────────────
function toggleNoteEdit() {
  noteEditing = !noteEditing;
  const view = document.getElementById("notes-view");
  const ta = document.getElementById("nta");
  const btnE = document.getElementById("btn-note-edit");
  const btnS = document.getElementById("btn-note-save");
  if (noteEditing) {
    view.style.display = "none";
    ta.style.display = "block";
    ta.focus();
    btnE.textContent = "✕ Cancel";
    btnS.style.display = "flex";
  } else {
    view.style.display = "";
    ta.style.display = "none";
    btnE.textContent = "✎ Edit notes";
    btnS.style.display = "none";
  }
}

async function commitNote(key) {
  const val = document.getElementById("nta").value.trim();
  notes[key] = val;
  const view = document.getElementById("notes-view");
  view.textContent = val || "No notes yet. Tap Edit to add.";
  view.className = "notes-view" + (val ? "" : " empty");
  toggleNoteEdit();
  syncStatus("Saving…");
  await saveUserData();
  syncStatus("Notes saved ✓");
}

// ── FAVOURITES & FAV ICON ─────────────────────────────────────────────
function updFavIco() {
  const btn = document.getElementById("btn-fav-h");
  if (!btn || !cur) return;
  btn.textContent = favs.includes(cur) ? "♥" : "♡";
  btn.style.color = favs.includes(cur) ? "#E8A96A" : "";
}

async function toggleFav() {
  if (!cur) return;
  const i = favs.indexOf(cur);
  if (i === -1) favs.push(cur); else favs.splice(i, 1);
  updFavIco();
  const fb = document.getElementById("fb");
  if (fb) { const f = favs.includes(cur); fb.className = "btn-act btn-fav" + (f ? " on" : ""); fb.textContent = f ? "♥ Saved" : "♡ Save"; }
  syncStatus("Saving…");
  await saveUserData();
  syncStatus("Saved ✓");
}

// ── DELETE SAUCE ──────────────────────────────────────────────────────
async function doDeleteSauce(key) {
  if (!confirm("Delete this sauce from the catalog?")) return;
  syncStatus("Deleting…");
  try {
    await fbDeleteSauce(key);
    syncStatus("Deleted ✓");
    showToast("Sauce deleted");
    goBack();
  } catch(e) {
    syncStatus("Error deleting", true);
  }
}

// ── FORM ──────────────────────────────────────────────────────────────
function openForm(key) {
  editKey = key;
  const R = allR();
  const s = key ? R[key] : null;
  photoData = {};

  document.getElementById("form-b").innerHTML = `
    <div class="fs">
      <div class="fst">Photo</div>
      <div class="fpa" id="photo-area">
        ${s?.photo ? `<img class="fpp" id="photo-prev" src="${s.photo}" alt="">` : `<div class="fpai">📷</div><span class="fpas">Tap to upload photo</span>`}
        <input type="file" accept="image/*" onchange="handlePhoto(this)">
      </div>
    </div>

    <div class="fs">
      <div class="fst">Basic information</div>
      <div class="fr2"><label>Name (English) *</label><input id="f-nm" value="${esc(s?.nm || "")}" placeholder="e.g. Béarnaise Sauce"></div>
      <div class="fr2"><label>Name (French)</label><input id="f-fr" value="${esc(s?.fr || "")}" placeholder="e.g. Sauce Béarnaise"></div>
      <div class="fr2"><label>Mother sauce / Base</label><input id="f-mo" value="${esc(s?.mo || "")}" placeholder="e.g. Béarnaise, Hollandaise, —"></div>
      <div class="f2col">
        <div class="fr2"><label>Category *</label>
          <select id="f-cat">${CATS.map(c => `<option${s?.cat === c ? " selected" : ""}>${c}</option>`).join("")}</select>
        </div>
        <div class="fr2"><label>Cuisine</label><input id="f-cl" value="${esc(s?.cl || "French")}" placeholder="French"></div>
      </div>
    </div>

    <div class="fs">
      <div class="fst">Properties</div>
      <div class="f2col">
        <div class="fr2"><label>Type *</label>
          <select id="f-tp">${TYPES.map(t => `<option${s?.tp === t ? " selected" : ""}>${t}</option>`).join("")}</select>
        </div>
        <div class="fr2"><label>Temperature</label>
          <select id="f-tm">${TEMPS.map(t => `<option${s?.tm === t ? " selected" : ""}>${t}</option>`).join("")}</select>
        </div>
      </div>
      <div class="f2col">
        <div class="fr2"><label>Difficulty</label>
          <select id="f-df">${DIFFS.map(d => `<option${s?.df === d ? " selected" : ""}>${d}</option>`).join("")}</select>
        </div>
        <div class="fr2"><label>Time</label><input id="f-ti" value="${esc(s?.ti || "")}" placeholder="e.g. 30 min"></div>
      </div>
      <div class="fr2"><label>Base stock</label><input id="f-bs" value="${esc(s?.bs || "")}" placeholder="e.g. Butter/Egg, Fish stock, Milk"></div>
    </div>

    <div class="fs">
      <div class="fst">Ingredients</div>
      ${["base","aromatics","acid","finish"].map(grp => `
        <div class="fr2">
          <label style="text-transform:capitalize">${grp}</label>
          <div class="dl" id="ig-${grp}">
            ${(s?.ig?.[grp] || [""]).map((v, i) => dynRow(`ig-${grp}`, v, i)).join("")}
          </div>
          <button class="dra" onclick="addDynRow('ig-${grp}')">+ Add item</button>
        </div>`).join("")}
    </div>

    <div class="fs">
      <div class="fst">Technique steps</div>
      <div class="dl" id="f-st">
        ${(s?.st || [""]).map((v, i) => dynRow("f-st", v, i)).join("")}
      </div>
      <button class="dra" onclick="addDynRow('f-st')">+ Add step</button>
    </div>

    <div class="fs">
      <div class="fst">Full recipe</div>
      <div class="fr2"><textarea id="f-rc" rows="5" placeholder="Write the full recipe text…">${esc(s?.rc || "")}</textarea></div>
    </div>

    <div class="fs">
      <div class="fst">Relations</div>
      <div class="fr2"><label>Pairs with (comma-separated)</label>
        <input id="f-pr" value="${esc((s?.pr || []).join(", "))}" placeholder="steak, eggs, asparagus…">
      </div>
      <div class="fr2"><label>Derivative sauces (comma-separated)</label>
        <input id="f-dv" value="${esc((s?.dv || []).join(", "))}" placeholder="Choron, Foyot…">
      </div>
      <div class="fr2"><label>Similar sauces (comma-separated)</label>
        <input id="f-sm" value="${esc((s?.sm || []).join(", "))}" placeholder="Hollandaise, Foyot…">
      </div>
    </div>

    <div class="fa">
      <button class="bcn" onclick="goBack()">Cancel</button>
      <button class="bsv" onclick="saveSauce()">✓ ${key ? "Save changes" : "Add to catalog"}</button>
    </div>`;

  showS("form", key ? "Edit Sauce" : "Add New Sauce");
}

function dynRow(listId, val, idx) {
  return `<div class="dr" id="dr-${listId}-${idx}">
    <input value="${esc(val)}" placeholder="…">
    <button class="drd" onclick="delDynRow('${listId}',${idx})" title="Remove">✕</button>
  </div>`;
}
function addDynRow(listId) {
  const c = document.getElementById(listId);
  const idx = c.children.length;
  c.insertAdjacentHTML("beforeend", dynRow(listId, "", idx));
}
function delDynRow(listId, idx) {
  document.getElementById(`dr-${listId}-${idx}`)?.remove();
}
function getDynVals(listId) {
  const c = document.getElementById(listId); if (!c) return [];
  return Array.from(c.querySelectorAll("input")).map(i => i.value.trim()).filter(Boolean);
}

function handlePhoto(inp) {
  const file = inp.files[0]; if (!file) return;
  // Resize to max 800px and compress
  const img = new Image();
  img.onload = () => {
    const MAX = 800;
    let w = img.width, h = img.height;
    if (w > MAX || h > MAX) {
      if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
      else { w = Math.round(w * MAX / h); h = MAX; }
    }
    const canvas = document.createElement("canvas");
    canvas.width = w; canvas.height = h;
    canvas.getContext("2d").drawImage(img, 0, 0, w, h);
    const data = canvas.toDataURL("image/jpeg", 0.75);
    photoData.data = data;
    const area = document.getElementById("photo-area");
    const prev = document.getElementById("photo-prev");
    if (!prev) {
      area.innerHTML = `<img class="fpp" id="photo-prev" src="${data}" alt=""><input type="file" accept="image/*" onchange="handlePhoto(this)">`;
    } else {
      prev.src = data;
    }
  };
  img.src = URL.createObjectURL(file);
}

async function saveSauce() {
  const nm = document.getElementById("f-nm").value.trim();
  if (!nm) { showToast("Name is required"); return; }

  const R = allR();
  const key = editKey || (nm.toLowerCase().replace(/[^a-z0-9]+/g, "_") + "_" + Date.now());
  const existing = editKey ? R[editKey] : null;

  const sauce = {
    nm,
    fr: document.getElementById("f-fr").value.trim() || nm,
    mo: document.getElementById("f-mo").value.trim() || "—",
    cat: document.getElementById("f-cat").value,
    cl: document.getElementById("f-cl").value.trim() || "French",
    tp: document.getElementById("f-tp").value,
    tm: document.getElementById("f-tm").value,
    df: document.getElementById("f-df").value,
    ti: document.getElementById("f-ti").value.trim(),
    bs: document.getElementById("f-bs").value.trim() || "—",
    ig: {
      base: getDynVals("ig-base"),
      aromatics: getDynVals("ig-aromatics"),
      acid: getDynVals("ig-acid"),
      finish: getDynVals("ig-finish")
    },
    st: getDynVals("f-st"),
    rc: document.getElementById("f-rc").value.trim(),
    pr: document.getElementById("f-pr").value.split(",").map(s => s.trim()).filter(Boolean),
    dv: document.getElementById("f-dv").value.split(",").map(s => s.trim()).filter(Boolean),
    sm: document.getElementById("f-sm").value.split(",").map(s => s.trim()).filter(Boolean),
    photo: photoData.data || existing?.photo || "",
  };

  syncStatus("Saving…");
  try {
    await fbSaveSauce(key, sauce);
    syncStatus("Saved ✓");
    showToast(editKey ? "Changes saved ✓" : "Sauce added ✓");
    cur = key;
    openSauce(key);
  } catch(e) {
    syncStatus("Error saving", true);
    showToast("Error: " + e.message);
  }
}

// ── HELPERS ───────────────────────────────────────────────────────────
function esc(s) {
  return String(s || "").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2200);
}
