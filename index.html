<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#2C1810">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Sauces">
<title>French Sauces</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bd:#2C1810;--b:#5C3D1E;--bl:#8B6914;--a:#C4742A;--al:#E8A96A;
  --c:#F5F0E8;--cd:#EDE5D4;--p:#D4C4A0;
  --t:#1A0F08;--m:#7A6050;--dv:#D4C4A0;
  --g:#4A6741;--r:#8B2E2E;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;overflow:hidden;background:var(--bd);font-family:'Jost',sans-serif;color:var(--t)}
#app{height:100%;width:100%;max-width:480px;margin:0 auto;background:var(--c);display:flex;flex-direction:column;overflow:hidden}

/* HEADER */
.hdr{height:56px;background:var(--bd);display:flex;align-items:center;padding:0 14px;gap:8px;flex-shrink:0}
.hbk{width:34px;height:34px;border:none;background:rgba(255,255,255,.14);border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--c);font-size:22px;flex-shrink:0}
.htl{flex:1;font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:500;color:var(--c);letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hbt{width:34px;height:34px;border:none;background:transparent;border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--al);flex-shrink:0}
.hbt:active{background:rgba(255,255,255,.1)}

/* SCREENS */
.screen{display:none;flex:1;flex-direction:column;overflow:hidden}
.screen.active{display:flex}
.sb{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.sb::-webkit-scrollbar{display:none}

/* BOTTOM NAV */
.bnav{height:60px;background:var(--bd);display:flex;padding:0 4px;padding-bottom:env(safe-area-inset-bottom,0);flex-shrink:0;border-top:1px solid rgba(255,255,255,.08)}
.nb{flex:1;height:100%;border:none;background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border-radius:10px}
.nb svg{width:22px;height:22px;color:rgba(255,255,255,.38)}
.nb span{font-size:10px;color:rgba(255,255,255,.38);text-transform:uppercase;letter-spacing:.04em}
.nb.on svg,.nb.on span{color:var(--al)}

/* HOME */
.hero{background:var(--bd);padding:22px 20px 30px;position:relative}
.hero::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:22px;background:var(--c);border-radius:22px 22px 0 0}
.htag{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:6px}
.htit{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:300;color:var(--c);line-height:1.1}
.htit em{font-style:italic;color:var(--al)}
.hsub{font-size:12px;color:rgba(255,255,255,.38);margin-top:8px}
.swrap{padding:16px 14px 0;position:relative}
.swrap input{width:100%;height:44px;border:1.5px solid var(--dv);border-radius:12px;padding:0 14px 0 42px;font-size:13px;background:white;color:var(--t);outline:none;font-family:'Jost',sans-serif}
.swrap input:focus{border-color:var(--bl)}
.sico{position:absolute;left:27px;top:50%;transform:translateY(-50%);color:var(--m);pointer-events:none;font-size:17px}
.slbl{padding:18px 16px 8px;font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--m)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 14px 20px}
.gc{background:white;border-radius:14px;padding:16px 14px;border:1.5px solid var(--dv);cursor:pointer;box-shadow:0 2px 10px rgba(44,24,16,.08)}
.gc:active{transform:scale(.97)}
.gico{width:42px;height:42px;background:var(--cd);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:21px;margin-bottom:11px}
.gt{font-size:12px;font-weight:500;color:var(--b);letter-spacing:.03em;text-transform:uppercase;margin-bottom:3px}
.gd{font-size:11px;color:var(--m);line-height:1.4}

/* SEARCH RESULTS */
.sres{display:none;padding:10px 14px}
.sri{display:flex;align-items:center;gap:10px;padding:10px 12px;background:white;border-radius:10px;border:1.5px solid var(--dv);margin-bottom:7px;cursor:pointer}
.sri:active{border-color:var(--a)}
.srio{width:36px;height:36px;border-radius:8px;background:var(--cd);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.srn{font-size:13px;font-weight:500;color:var(--t)}
.src{font-size:11px;color:var(--m)}

/* HIERARCHY */
.ch{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;background:white;border-bottom:1px solid var(--dv)}
.ch:active{background:var(--cd)}
.cico{width:34px;height:34px;border-radius:8px;background:var(--cd);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.cnm{flex:1}
.cnm-m{font-size:14px;font-weight:500;color:var(--b)}
.cnm-f{font-size:11px;color:var(--m)}
.chev{color:var(--p);font-size:18px;transition:transform .2s}
.chev.open{transform:rotate(90deg)}
.csl{display:none;background:var(--cd)}
.csl.open{display:block}
.csi{padding:0 16px 0 58px;border-bottom:1px solid rgba(212,196,160,.3)}
.csh{display:flex;align-items:center;justify-content:space-between;padding:10px 0;cursor:pointer}
.csnm{font-size:12px;font-weight:500;color:var(--m);text-transform:uppercase;letter-spacing:.04em}
.csmo{font-size:10px;color:var(--p);margin-top:1px}
.csch{color:var(--p);font-size:14px;transition:transform .2s}
.csch.open{transform:rotate(90deg)}
.css{display:none;padding:4px 0 10px}
.css.open{display:block}
.sli{display:flex;align-items:center;padding:9px 0 9px 6px;cursor:pointer;border-radius:6px}
.sli:active{background:rgba(212,196,160,.3)}
.sld{width:5px;height:5px;border-radius:50%;background:var(--a);flex-shrink:0;margin-right:8px}
.sln{font-size:13px;color:var(--t);flex:1}
.slt{font-size:10px;padding:2px 6px;background:white;border-radius:5px;color:var(--bl);font-weight:500;margin-right:4px}

/* LISTS */
.cli-list{padding:10px 14px}
.cli{display:flex;align-items:center;gap:12px;padding:12px 14px;background:white;border-radius:10px;border:1.5px solid var(--dv);margin-bottom:8px;cursor:pointer}
.cli:active{border-color:var(--a)}
.clio{font-size:22px;width:30px;text-align:center;flex-shrink:0}
.clnm{font-size:14px;font-weight:500;color:var(--t);flex:1}
.clct{font-size:12px;color:var(--m)}

/* SAUCE DETAIL */
.sauce-hero{background:var(--bd);padding:18px 18px 26px;position:relative;overflow:hidden}
.sauce-hero::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:18px;background:white;border-radius:18px 18px 0 0}
.shimg{width:100%;height:150px;object-fit:cover;position:absolute;top:0;left:0;right:0;opacity:.35;display:block}
.shc{position:relative;z-index:1}
.scat{font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--al);margin-bottom:6px}
.snm2{font-family:'Cormorant Garamond',serif;font-size:27px;font-weight:400;color:var(--c);line-height:1.1;margin-bottom:4px}
.sfr{font-family:'Cormorant Garamond',serif;font-size:14px;font-style:italic;color:rgba(255,255,255,.38)}
.sec{padding:14px 16px;border-bottom:1px solid var(--dv);background:white}
.sec:nth-child(even){background:var(--c)}
.stl{font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--m);margin-bottom:10px}
.mg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.mi{background:var(--cd);border-radius:10px;padding:8px 10px;border:1px solid var(--dv)}
.ml{font-size:10px;color:var(--m);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.mv{font-size:12px;font-weight:500;color:var(--b)}

/* BREADCRUMBS */
.bc{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.bci{font-size:12px;color:var(--m);background:var(--cd);padding:4px 10px;border-radius:12px;border:1px solid var(--dv);cursor:pointer;transition:border-color .15s}
.bci:hover{border-color:var(--a);color:var(--a)}
.bci.plain{cursor:default}
.bci.plain:hover{border-color:var(--dv);color:var(--m)}
.bcsep{color:var(--p);font-size:14px}

.tgs{display:flex;flex-wrap:wrap;gap:5px}
.tg2{font-size:11px;padding:4px 10px;background:var(--cd);border-radius:12px;color:var(--m);border:1px solid var(--dv)}
.ig{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.igg{background:var(--cd);border-radius:10px;padding:10px;border:1px solid var(--dv)}
.igt{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--m);margin-bottom:7px}
.igi{font-size:11px;color:var(--t);padding:2px 0;border-bottom:1px solid rgba(212,196,160,.5)}
.igi:last-child{border-bottom:none}
.igi::before{content:'• ';color:var(--a)}
.stps{}
.stp{display:flex;gap:10px;margin-bottom:8px;padding:10px;background:var(--cd);border-radius:10px;border:1px solid var(--dv)}
.stn{width:24px;height:24px;border-radius:50%;background:var(--bd);color:var(--c);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0}
.stx{font-size:12px;color:var(--t);line-height:1.5;padding-top:2px}
.rb{background:var(--cd);border-radius:10px;padding:14px;border:1px solid var(--dv)}
.rt{font-size:12px;color:var(--t);line-height:1.75;font-weight:300}
.rl{display:flex;flex-direction:column;gap:6px}
.rli{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--cd);border-radius:10px;border:1px solid var(--dv);cursor:pointer}
.rli:active{border-color:var(--a)}
.dt{background:var(--cd);border-radius:10px;padding:14px;border:1px solid var(--dv);text-align:center}
.dtm{display:inline-block;padding:6px 14px;background:var(--bd);color:var(--c);border-radius:8px;font-family:'Cormorant Garamond',serif;font-size:14px;margin-bottom:10px}
.dtl{width:1px;height:14px;background:var(--p);margin:0 auto 10px}
.dtc{display:flex;gap:6px;justify-content:center;flex-wrap:wrap}
.dtch{padding:5px 10px;border-radius:12px;background:white;border:1px solid var(--dv);font-size:11px;color:var(--b);cursor:pointer}
.dtch.cur{background:var(--a);color:white;border-color:var(--a)}

/* NOTES */
.notes-view{background:var(--cd);border-radius:10px;padding:12px;border:1px solid var(--dv);min-height:60px;font-size:12px;color:var(--t);line-height:1.6;white-space:pre-wrap}
.notes-view.empty{color:var(--m);font-style:italic}
.nta{width:100%;min-height:90px;background:white;border:1.5px solid var(--bl);border-radius:10px;padding:10px;font-family:'Jost',sans-serif;font-size:12px;line-height:1.6;color:var(--t);resize:none;outline:none;display:none}
.notes-btns{display:flex;gap:8px;margin-top:8px}

/* SAUCE ACTION BUTTONS */
.btn-row{display:flex;gap:8px;flex-wrap:wrap}
.btn-act{flex:1;min-width:0;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;font-size:12px;font-weight:500;font-family:'Jost',sans-serif;border:1.5px solid;white-space:nowrap;transition:opacity .15s}
.btn-act:active{opacity:.75}
.btn-fav{background:var(--cd);border-color:var(--dv);color:var(--b)}
.btn-fav.on{background:rgba(139,46,46,.08);border-color:rgba(139,46,46,.4);color:var(--r)}
.btn-edit{background:rgba(196,116,42,.08);border-color:var(--a);color:var(--a)}
.btn-del{background:rgba(139,46,46,.06);border-color:rgba(139,46,46,.35);color:var(--r)}
.btn-note{background:var(--cd);border-color:var(--dv);color:var(--b)}
.btn-note.on{background:rgba(74,103,65,.08);border-color:rgba(74,103,65,.4);color:var(--g)}
.btn-save-note{background:var(--bd);border-color:var(--bd);color:var(--c);display:none}

.badgec{display:inline-block;font-size:10px;padding:2px 7px;background:rgba(196,116,42,.15);color:var(--a);border-radius:10px;border:1px solid rgba(196,116,42,.3);margin-left:6px;vertical-align:middle}

.fe{text-align:center;padding:60px 20px;color:var(--m)}
.fe-ico{font-size:48px;margin-bottom:12px}
.fe p{font-size:13px;line-height:1.6}

/* FORM */
.fb{padding:16px}
.fs{margin-bottom:20px}
.fst{font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--m);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--dv)}
.fr2{margin-bottom:10px}
.fr2 label{display:block;font-size:11px;color:var(--m);margin-bottom:4px;letter-spacing:.04em}
.fr2 input,.fr2 select,.fr2 textarea{width:100%;border:1.5px solid var(--dv);border-radius:10px;padding:8px 10px;font-size:13px;font-family:'Jost',sans-serif;color:var(--t);background:white;outline:none}
.fr2 input:focus,.fr2 select:focus,.fr2 textarea:focus{border-color:var(--bl)}
.fr2 textarea{resize:vertical;min-height:72px;line-height:1.5}
.f2col{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fpa{border:1.5px dashed var(--dv);border-radius:10px;height:130px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:6px;background:var(--cd);position:relative;overflow:hidden}
.fpa:hover{border-color:var(--a)}
.fpa input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;font-size:0}
.fpai{font-size:30px}
.fpas{font-size:12px;color:var(--m)}
.fpp{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.dl{display:flex;flex-direction:column;gap:6px}
.dr{display:flex;gap:6px;align-items:center}
.dr input{flex:1;border:1.5px solid var(--dv);border-radius:10px;padding:7px 10px;font-size:12px;font-family:'Jost',sans-serif;color:var(--t);background:white;outline:none}
.dr input:focus{border-color:var(--bl)}
.drd{width:28px;height:28px;border:none;background:transparent;cursor:pointer;color:var(--m);display:flex;align-items:center;justify-content:center;border-radius:6px;font-size:16px;flex-shrink:0}
.drd:hover{color:var(--r);background:rgba(139,46,46,.08)}
.dra{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--a);cursor:pointer;padding:4px 0;background:none;border:none;font-family:'Jost',sans-serif;margin-top:2px}
.fa{display:flex;gap:8px;margin-top:24px;padding-bottom:24px}
.bsv{flex:2;height:44px;background:var(--bd);color:var(--c);border:none;border-radius:10px;font-size:14px;font-weight:500;font-family:'Jost',sans-serif;cursor:pointer}
.bsv:active{opacity:.85}
.bcn{flex:1;height:44px;background:var(--cd);color:var(--m);border:1.5px solid var(--dv);border-radius:10px;font-size:13px;font-family:'Jost',sans-serif;cursor:pointer}

/* SYNC STATUS */
.sync{position:fixed;bottom:68px;right:16px;font-size:11px;padding:5px 12px;border-radius:20px;background:var(--bd);color:var(--c);opacity:0;transition:opacity .3s;pointer-events:none;z-index:99}
.sync.show{opacity:1}
.sync.err{background:var(--r)}

/* TOAST */
.toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);background:var(--bd);color:var(--c);padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;z-index:999}
.toast.show{opacity:1}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:12px;color:var(--m)}
.spin{width:28px;height:28px;border-radius:50%;border:2.5px solid var(--cd);border-top-color:var(--a);animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <button class="hbk" id="btn-back" style="display:none" onclick="goBack()">‹</button>
    <div class="htl" id="hdr-t">French Sauces</div>
    <button class="hbt" id="btn-fav-h" style="display:none" onclick="toggleFav()" title="Save">♡</button>
    <button class="hbt" id="btn-add" onclick="openForm(null)" title="Add sauce" style="font-size:24px">+</button>
  </div>

  <div class="screen active" id="s-home">
    <div class="sb">
      <div class="hero">
        <div class="htag">Classical Repertoire</div>
        <div class="htit">Les <em>Grandes</em><br>Sauces</div>
        <div class="hsub">French culinary sauces — complete catalog</div>
      </div>
      <div class="swrap">
        <span class="sico">🔍</span>
        <input type="text" id="srch" placeholder="Search sauces, ingredients…" oninput="onSearch(this.value)">
      </div>
      <div id="sres" class="sres"></div>
      <div id="home-main">
        <div class="slbl">Browse by</div>
        <div class="grid">
          <div class="gc" onclick="navTo('hierarchy')"><div class="gico">🌳</div><div class="gt">Hierarchy</div><div class="gd">Mother sauces and derivatives</div></div>
          <div class="gc" onclick="navTo('usage')"><div class="gico">🍽️</div><div class="gt">By Dish</div><div class="gd">Find the right sauce for your product</div></div>
          <div class="gc" onclick="navTo('technique')"><div class="gico">👨‍🍳</div><div class="gt">By Technique</div><div class="gd">Emulsified, roux-based, reductions…</div></div>
          <div class="gc" onclick="navTo('favs')"><div class="gico">♥</div><div class="gt">Saved</div><div class="gd">Your saved sauces and notes</div></div>
        </div>
      </div>
    </div>
  </div>

  <div class="screen" id="s-hierarchy"><div class="sb" id="hier-b"></div></div>
  <div class="screen" id="s-usage"><div class="sb" id="usage-b"></div></div>
  <div class="screen" id="s-technique"><div class="sb" id="tech-b"></div></div>
  <div class="screen" id="s-sublist"><div class="sb" id="sub-b"></div></div>
  <div class="screen" id="s-sauce"><div class="sb" id="sauce-b"></div></div>
  <div class="screen" id="s-favs"><div class="sb" id="favs-b"></div></div>
  <div class="screen" id="s-form"><div class="sb"><div class="fb" id="form-b"></div></div></div>

  <div class="bnav">
    <button class="nb on" id="nb-home" onclick="navTo('home')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Home</span>
    </button>
    <button class="nb" id="nb-hierarchy" onclick="navTo('hierarchy')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="4" r="2"/><path d="M12 6v5M9 11H4v3M20 11h-5v3"/><circle cx="7" cy="17" r="2"/><circle cx="17" cy="17" r="2"/></svg>
      <span>Structure</span>
    </button>
    <button class="nb" id="nb-usage" onclick="navTo('usage')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      <span>By Dish</span>
    </button>
    <button class="nb" id="nb-favs" onclick="navTo('favs')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      <span>Saved</span>
    </button>
  </div>
</div>

<div class="sync" id="sync-status"></div>
<div class="toast" id="toast"></div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, deleteDoc, collection, getDocs, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAcRD5GzqvgtvBTEAm2MQWULrhmVsjyciE",
  authDomain: "sauce-app-c21f9.firebaseapp.com",
  projectId: "sauce-app-c21f9",
  storageBucket: "sauce-app-c21f9.firebasestorage.app",
  messagingSenderId: "992877586399",
  appId: "1:992877586399:web:0b25b8796cc7864e6a866a"
};

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);

// Expose Firebase ops to global app
window.FB = {
  async saveSauce(key, data) {
    await setDoc(doc(db, "sauces", key), data);
  },
  async deleteSauce(key) {
    await deleteDoc(doc(db, "sauces", key));
  },
  async saveUserData(key, data) {
    await setDoc(doc(db, "userdata", key), data);
  },
  async getUserData(key) {
    const snap = await getDoc(doc(db, "userdata", key));
    return snap.exists() ? snap.data() : null;
  },
  // Listen to custom sauces in real time
  listenSauces(cb) {
    return onSnapshot(collection(db, "sauces"), snap => {
      const result = {};
      snap.forEach(d => { result[d.id] = d.data(); });
      cb(result);
    });
  }
};

// Init app after Firebase ready
window.initApp();
</script>

<script src="sauces-data.js"></script>
<script src="app.js"></script>
